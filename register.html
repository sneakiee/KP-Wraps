<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KP Wraps — Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', 'Trebuchet MS', sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #111827 100%);
      color: #1a1f2e;
      padding: 1.5rem;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 2.5rem 2.2rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: .12em;
      color: #49a2e6;
      text-align: center;
      margin-bottom: .1rem;
    }
    .tagline { text-align: center; color: #666; font-size: .85rem; margin-bottom: 1.6rem; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    label { display: block; font-size: .82rem; font-weight: 600; color: #444; margin-bottom: .3rem; }
    input {
      width: 100%;
      padding: .65rem .9rem;
      border: 1.5px solid #d0cdc8;
      border-radius: 8px;
      font-size: .95rem;
      background: #fff;
      margin-bottom: 1rem;
      font-family: inherit;
      transition: border-color .2s;
    }
    input:focus { outline: none; border-color: #49a2e6; }
    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-top: .5rem; }
    button {
      padding: .7rem;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background .2s, color .2s;
    }
    .btn-submit { background: #49a2e6; color: #fff; border: none; }
    .btn-submit:hover { background: #2d86c9; }
    .btn-back { background: transparent; color: #49a2e6; border: 2px solid #49a2e6; }
    .btn-back:hover { background: #49a2e6; color: #fff; }
    .msg { margin-top: .9rem; text-align: center; font-size: .88rem; color: #c0392b; min-height: 1.2em; }
    .msg.ok { color: #27ae60; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><img src="images/logos/logo.jpeg" alt="KP Wraps" style="width:140px;border-radius:8px;"></div>
    <p class="tagline">Create your account</p>
    <div class="row2">
      <div>
        <label>First Name</label>
        <input type="text" id="first_name" placeholder="Jane">
      </div>
      <div>
        <label>Last Name</label>
        <input type="text" id="last_name" placeholder="Doe">
      </div>
    </div>
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com">
    <label>Phone</label>
    <input type="tel" id="phone" placeholder="905-555-0100">
    <label>Password <span style="font-weight:400;color:#888">(8+ chars, include a number)</span></label>
    <input type="password" id="password" placeholder="••••••••">
    <div class="btn-row">
      <button class="btn-submit" onclick="doRegister()">Create Account</button>
      <button class="btn-back" onclick="location.href='index.html'">Back</button>
    </div>
    <p class="msg" id="msg"></p>
  </div>
  <script>
    async function doRegister() {
      const first    = document.getElementById('first_name').value.trim();
      const last     = document.getElementById('last_name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const phone    = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const msg      = document.getElementById('msg');
      msg.className  = 'msg';
      if (!first || !last || !email || !password) { msg.textContent = 'Please fill in all required fields.'; return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { msg.textContent = 'Please enter a valid email.'; return; }
      if (password.length < 8 || !/\d/.test(password)) { msg.textContent = 'Password must be 8+ chars and include a number.'; return; }
      const fd = new FormData();
      fd.append('first_name', first); fd.append('last_name', last);
      fd.append('email', email); fd.append('phone', phone); fd.append('password', password);
      try {
        const res  = await fetch('register.php', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.success) {
          msg.className = 'msg ok';
          msg.textContent = 'Account created! Redirecting to login…';
          setTimeout(() => location.href = 'index.html', 1200);
        } else {
          msg.textContent = data.error || 'Registration failed.';
        }
      } catch { msg.textContent = 'Network error. Please try again.'; }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
  </script>
</body>
</html>
