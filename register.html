<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KP Wraps — Register</title>
  <!-- google fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/register.css">
</head>
<body>
  <div class="card">
    <div class="logo"><img src="images/logos/logo.jpeg" alt="KP Wraps" style="width:140px;border-radius:8px;"></div>
    <p class="tagline">Create your account</p>
    <!-- first and last name side by side -->
    <div class="row2">
      <div>
        <label>First Name</label>
        <input type="text" id="first_name" placeholder="Jane">
      </div>
      <div>
        <label>Last Name</label>
        <input type="text" id="last_name" placeholder="Doe">
      </div>
    </div>
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com">
    <label>Phone</label>
    <input type="tel" id="phone" placeholder="905-555-0100">
    <label>Password <span style="font-weight:400;color:#888">(8+ chars, include a number)</span></label>
    <input type="password" id="password" placeholder="••••••••">
    <div class="btn-row">
      <button class="btn-submit" id="registerBtn">Create Account</button>
      <button class="btn-back" id="backToLoginBtn">Back</button>
    </div>
    <p class="msg" id="msg"></p>
  </div>
  <script src="js/register.js"></script>
</body>
</html>
