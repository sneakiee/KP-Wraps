<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KP Wraps — Login</title>
  <!-- google fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <div class="card">
    <div class="logo"><img src="images/logos/logo.jpeg" alt="KP Wraps" style="width:140px;border-radius:8px;"></div>
    <p class="tagline">Car Wrapping &amp; Detailing</p>
    <div>
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="username">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      <div class="btn-row">
        <button class="btn-login" id="loginBtn">Login</button>
        <!-- register button goes to the registration page -->
        <button class="btn-register" id="goRegisterBtn">Register</button>
      </div>
      <p class="msg" id="msg"></p>
    </div>
  </div>
  <script src="js/index.js"></script>
</body>
</html>
