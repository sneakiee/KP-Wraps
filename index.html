<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KP Wraps — Login</title>
  <!-- google fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    /* dark background, card centred on the page */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', 'Trebuchet MS', sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #111827 100%);
      color: #1a1f2e;
      padding: 1.5rem;
    }
    /* white login card */
    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 2.5rem 2.2rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: .12em;
      color: #49a2e6;
      text-align: center;
      margin-bottom: .25rem;
    }
    .tagline {
      text-align: center;
      color: #666;
      font-size: .85rem;
      margin-bottom: 1.8rem;
    }
    label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: #444;
      margin-bottom: .3rem;
    }
    input {
      width: 100%;
      padding: .65rem .9rem;
      border: 1.5px solid #d0cdc8;
      border-radius: 8px;
      font-size: .95rem;
      background: #fff;
      margin-bottom: 1rem;
      transition: border-color .2s;
      font-family: inherit;
    }
    input:focus { outline: none; border-color: #49a2e6; }
    /* login and register buttons side by side */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem;
      margin-top: .5rem;
    }
    button {
      padding: .7rem;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background .2s, color .2s;
    }
    /* solid blue login button */
    .btn-login {
      background: #49a2e6;
      color: #fff;
      border: none;
    }
    .btn-login:hover { background: #2d86c9; }
    /* outline register button */
    .btn-register {
      background: transparent;
      color: #49a2e6;
      border: 2px solid #49a2e6;
    }
    .btn-register:hover { background: #49a2e6; color: #fff; }
    /* error shown in red, success in green */
    .msg { margin-top: .9rem; text-align: center; font-size: .88rem; color: #c0392b; min-height: 1.2em; }
    .msg.ok { color: #27ae60; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><img src="images/logos/logo.jpeg" alt="KP Wraps" style="width:140px;border-radius:8px;"></div>
    <p class="tagline">Car Wrapping &amp; Detailing</p>
    <div>
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="username">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      <div class="btn-row">
        <button class="btn-login" onclick="doLogin()">Login</button>
        <!-- register button goes to the registration page -->
        <button class="btn-register" onclick="location.href='register.html'">Register</button>
      </div>
      <p class="msg" id="msg"></p>
    </div>
  </div>
  <script>
    // handle the login form submission
    async function doLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const msg      = document.getElementById('msg');
      msg.className  = 'msg';
      // make sure both fields are filled in
      if (!email || !password) { msg.textContent = 'Please enter your email and password.'; return; }
      const fd = new FormData();
      fd.append('email', email);
      fd.append('password', password);
      try {
        const res  = await fetch('login.php', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.success) {
          // show welcome message then redirect to the page login.php sends back
          msg.className = 'msg ok';
          msg.textContent = 'Welcome back! Redirecting…';
          setTimeout(() => location.href = data.redirect, 800);
        } else {
          msg.textContent = data.error || 'Login failed.';
        }
      } catch { msg.textContent = 'Network error. Please try again.'; }
    }
    // allow pressing enter to submit the login form
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
